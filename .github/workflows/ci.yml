name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install dependencies
        run: |
          python -m venv ~/.vision-tools-env
          ~/.vision-tools-env/bin/pip install --upgrade pip
          ~/.vision-tools-env/bin/pip install mcp[cli] Pillow numpy
          ~/.vision-tools-env/bin/pip install pytest mypy ruff types-Pillow

      - name: Lint (ruff check)
        run: ~/.vision-tools-env/bin/ruff check .

      - name: Format check (ruff format)
        run: ~/.vision-tools-env/bin/ruff format --check .

      - name: Type check (mypy)
        run: ~/.vision-tools-env/bin/mypy .

      - name: Test (pytest)
        run: ~/.vision-tools-env/bin/pytest -v

      - name: File length check
        run: |
          MAX_LINES=750
          fail=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path '*__pycache__*'); do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt "$MAX_LINES" ]; then
              echo "OVER LIMIT: $f ($lines lines, max $MAX_LINES)"
              fail=1
            fi
          done
          exit $fail
