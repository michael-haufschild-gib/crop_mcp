name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install dependencies
        run: |
          python -m venv ~/.vision-tools-env
          ~/.vision-tools-env/bin/pip install --upgrade pip
          ~/.vision-tools-env/bin/pip install -r requirements.lock

      - name: Run quality pipeline (make check)
        run: make check
